[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=YOUR_LAN_SUBNET
external_media_address=YOUR_PUBLIC_IP
external_signaling_address=YOUR_PUBLIC_IP

[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/asterisk/keys/fullchain.pem
priv_key_file=/etc/asterisk/keys/privkey.pem
method=tlsv1_2
local_net=YOUR_LAN_SUBNET
external_media_address=YOUR_PUBLIC_IP
external_signaling_address=YOUR_PUBLIC_IP

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
websocket_write_timeout=30000


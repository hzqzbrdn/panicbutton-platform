[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
; No globals needed

; ================================================================
; DEFAULT SITE — panic-calls
; ================================================================
[panic-calls]
; Panic call to operator
exten => 9999,1,NoOp(Panic from ${CALLERID(num)})
 same => n,Set(CALLERID(name)=PANIC: ${CALLERID(num)})
 same => n,Dial(PJSIP/operator,30,rT)
 same => n,Hangup()

; Device extensions — panic to operator
exten => pb001,1,NoOp(Panic from pb001)
 same => n,Set(CALLERID(name)=PANIC: pb001)
 same => n,Dial(PJSIP/operator,30,rT)
 same => n,Hangup()

exten => 1002,1,NoOp(Panic from 1002)
